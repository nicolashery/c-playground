version: "3"

vars:
  BUILD_DIR: build

# Suppress macOS malloc nano zone warning when using AddressSanitizer
# (nano allocator conflicts with ASan's memory layout, but fallback is harmless)
env:
  MallocNanoZone: 0

tasks:
  # --------------------------------------------------
  # Setup
  # --------------------------------------------------

  configure:
    desc: Configure CMake build directory
    cmds:
      - cmake -S . -B {{.BUILD_DIR}}
      # clangd looks for compile_commands.json in root directory
      - ln -sf {{.BUILD_DIR}}/compile_commands.json ./compile_commands.json

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} compile_commands.json

  # --------------------------------------------------
  # Build
  # --------------------------------------------------

  build:
    desc: Build everything
    cmds:
      - cmake --build {{.BUILD_DIR}}

  build:base:
    desc: Build base lib
    cmds:
      - cmake --build {{.BUILD_DIR}} --target base

  build:scratch:
    desc: Build Scratch
    cmds:
      - cmake --build {{.BUILD_DIR}} --target scratch

  build:bean:
    desc: Build Bean
    cmds:
      - cmake --build {{.BUILD_DIR}} --target bean

  build:dodge:
    desc: Build Dodge
    cmds:
      - cmake --build {{.BUILD_DIR}} --target dodge

  # --------------------------------------------------
  # Run
  # --------------------------------------------------

  run:scratch:
    desc: Run Scratch
    deps: [build:scratch]
    vars:
      STATS_PATH: data/stats.txt
    cmds:
      - cd {{.BUILD_DIR}}/scratch && ./scratch {{.STATS_PATH}}

  run:bean:
    desc: Run Bean
    deps: [build:bean]
    cmds:
      - ./{{.BUILD_DIR}}/bean/bean {{.CLI_ARGS}}

  run:dodge:
    desc: Run Dodge
    deps: [build:dodge]
    cmds:
      - cd {{.BUILD_DIR}}/dodge && ./dodge

  # --------------------------------------------------
  # Test
  # --------------------------------------------------

  test:
    desc: Run all tests
    deps: [build]
    cmds:
      - cd {{.BUILD_DIR}} && ctest --output-on-failure

  test:bean:
    desc: Run Bean tests
    deps: [build:bean]
    cmds:
      - ./bean/test.sh

  test:math_lib:
    desc: Run math_lib tests
    cmds:
      - cmake --build {{.BUILD_DIR}} --target test_math_utils
      - cmake --build {{.BUILD_DIR}} --target test_foo
      - ./{{.BUILD_DIR}}/libs/math_lib/test_math_utils
      - ./{{.BUILD_DIR}}/libs/math_lib/test_foo

  test:base:
    desc: Run base tests
    cmds:
      - cmake --build {{.BUILD_DIR}} --target test_arena
      - ./{{.BUILD_DIR}}/libs/base/test_arena

  # --------------------------------------------------
  # Tools
  # --------------------------------------------------

  format:
    desc: Run clang-format
    cmds:
      - |
        git ls-files '*.c' '*.h' | xargs clang-format -i

  lint:
    desc: Run clang-tidy (compile_commands.json must exist)
    cmds:
      # macOS only: --extra-arg to help clang-tidy find system headers
      - |
        git ls-files '*.c' '*.h' | xargs clang-tidy \
          --extra-arg=-isysroot --extra-arg=$(xcrun --show-sdk-path) \
          -p {{.BUILD_DIR}}
