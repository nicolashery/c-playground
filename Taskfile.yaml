version: "3"

vars:
  BUILD_DIR: build

tasks:
  # --------------------------------------------------
  # Setup
  # --------------------------------------------------

  configure:
    desc: Configure CMake build directory
    cmds:
      - cmake -S . -B {{.BUILD_DIR}}
      # clangd looks for compile_commands.json in root directory
      - ln -sf {{.BUILD_DIR}}/compile_commands.json ./compile_commands.json

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} compile_commands.json

  # --------------------------------------------------
  # Build
  # --------------------------------------------------

  build:
    desc: Build everything
    cmds:
      - cmake --build {{.BUILD_DIR}}

  build:bean:
    desc: Build Bean
    cmds:
      - cmake --build {{.BUILD_DIR}} --target bean

  build:snake:
    desc: Build Snake
    cmds:
      - cmake --build {{.BUILD_DIR}} --target snake

  # --------------------------------------------------
  # Run
  # --------------------------------------------------

  run:bean:
    desc: Run Bean
    deps: [build:bean]
    vars:
      LEDGER_PATH: bean/data/simple.bean
    cmds:
      - ./{{.BUILD_DIR}}/bean/bean {{.LEDGER_PATH}}

  run:snake:
    desc: Run Snake
    deps: [build:snake]
    cmds:
      - ./{{.BUILD_DIR}}/snake/snake

  # --------------------------------------------------
  # Tools
  # --------------------------------------------------

  format:
    desc: Run clang-format
    cmds:
      - |
        git ls-files '*.c' '*.h' | xargs clang-format -i

  lint:
    desc: Run clang-tidy
    # Ensure compile_commands.json exists
    deps: [configure]
    cmds:
      # macOS only: --extra-arg to help clang-tidy find system headers
      - |
        git ls-files '*.c' '*.h' | xargs clang-tidy \
          --extra-arg=-isysroot --extra-arg=$(xcrun --show-sdk-path) \
          -p {{.BUILD_DIR}}
